<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseLearn BI - Executive Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1a1f2e; }
        .nav-active { background-color: #6d4ef7 !important; color: white !important; }
        @media print {
            .no-print { display: none !important; }
            .print-full { width: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="sidebar w-64 h-full flex flex-col justify-between text-gray-400 no-print flex-shrink-0">
        <div>
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-white text-xl font-bold tracking-wider">PulseLearn BI</h1>
                <p class="text-xs text-gray-500 uppercase font-semibold mt-1">Elearning Intelligence</p>
            </div>
            
            <nav class="mt-6 px-4 space-y-1" id="nav-container">
                <div id="nav-group-admin" class="nav-group space-y-1">
                    <a href="/admin" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-dash">
                        <i class="fa-solid fa-chart-pie mr-3 w-5 text-center"></i> Admin Dashboard
                    </a>
                    <a href="/admin/enrollment" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-enroll">
                        <i class="fa-solid fa-chart-line mr-3 w-5 text-center"></i> Enrollment Analytics
                    </a>
                    <a href="/admin/utilization" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-util">
                        <i class="fa-solid fa-server mr-3 w-5 text-center"></i> License & Utilization
                    </a>
                    <a href="/admin/alerts" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-alerts">
                        <i class="fa-solid fa-triangle-exclamation mr-3 w-5 text-center"></i> At-Risk Alerts
                    </a>
                    <a href="/admin/students" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-studs">
                        <i class="fa-solid fa-user-graduate mr-3 w-5 text-center"></i> Students
                    </a>
                    <a href="/admin/courses" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-admin-courses">
                        <i class="fa-solid fa-book mr-3 w-5 text-center"></i> Courses
                    </a>
                </div>

                <div id="nav-group-instructor" class="nav-group hidden space-y-1">
                    <a href="/instructor" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-inst-dash">
                        <i class="fa-solid fa-chalkboard-user mr-3 w-5 text-center"></i> Instructor Dashboard
                    </a>
                    <a href="/instructor/gradebook" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-inst-grade">
                        <i class="fa-solid fa-graduation-cap mr-3 w-5 text-center"></i> Gradebook
                    </a>
                </div>

                <div id="nav-group-learner" class="nav-group hidden space-y-1">
                    <a href="/learner" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-800 hover:text-white transition" id="link-learn-dash">
                        <i class="fa-solid fa-house-user mr-3 w-5 text-center"></i> Learner Dashboard
                    </a>
                </div>
            </nav>
        </div>

        <div class="p-4 border-t border-gray-800 bg-gray-950">
            <div class="flex rounded-lg bg-gray-900 p-0.5 text-xs font-semibold">
                <button onclick="switchRoleView('admin')" id="btn-role-admin" class="w-1/3 py-1.5 rounded-md text-center transition cursor-pointer">Admin</button>
                <button onclick="switchRoleView('instructor')" id="btn-role-instructor" class="w-1/3 py-1.5 rounded-md text-center transition cursor-pointer">Instructor</button>
                <button onclick="switchRoleView('learner')" id="btn-role-learner" class="w-1/3 py-1.5 rounded-md text-center transition cursor-pointer">Learner</button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden print-full">
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 no-print flex-shrink-0">
            <div class="flex items-center">
                <span class="text-sm text-gray-500 font-medium" id="breadcrumb-title">Platform Workspace</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="window.print()" class="bg-white border border-gray-300 text-gray-700 px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center transition cursor-pointer">
                    <i class="fa-solid fa-file-pdf mr-2 text-red-500"></i> Export to PDF
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-gray-50 print-full">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // High-Performance Client Session Persistance Cache
        function switchRoleView(role) {
            localStorage.setItem('pulse_role', role);
            
            // Re-render UI components
            document.querySelectorAll('.nav-group').forEach(el => el.classList.add('hidden'));
            document.getElementById(`nav-group-${role}`).classList.remove('hidden');
            
            // Re-render System Toggle Buttons
            ['admin', 'instructor', 'learner'].forEach(r => {
                const btn = document.getElementById(`btn-role-${r}`);
                if(r === role) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('text-gray-400');
                }
            });

            // Handle Context Mapped Deep Intercepts 
            const path = window.location.pathname;
            if (role === 'admin' && !path.startsWith('/admin') && path !== '/') window.location.href = '/admin';
            if (role === 'instructor' && !path.startsWith('/instructor')) window.location.href = '/instructor';
            if (role === 'learner' && !path.startsWith('/learner')) window.location.href = '/learner';
        }

        // Active State Path Resolution Engine
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            let ActiveRole = 'admin';

            if (path.startsWith('/instructor')) ActiveRole = 'instructor';
            else if (path.startsWith('/learner')) ActiveRole = 'learner';
            else ActiveRole = 'admin';

            switchRoleView(ActiveRole);

            // Path ID Sync Matcher
            const mappings = {
                '/admin': 'link-admin-dash',
                '/admin/enrollment': 'link-admin-enroll',
                '/admin/utilization': 'link-admin-util',
                '/admin/alerts': 'link-admin-alerts',
                '/admin/students': 'link-admin-studs',
                '/admin/courses': 'link-admin-courses',
                '/instructor': 'link-inst-dash',
                '/instructor/gradebook': 'link-inst-grade',
                '/learner': 'link-learn-dash'
            };

            if (mappings[path]) {
                document.getElementById(mappings[path]).classList.add('nav-active');
                document.getElementById('breadcrumb-title').innerText = document.getElementById(mappings[path]).innerText.trim();
            }
        });
    </script>
</body>
</html>
